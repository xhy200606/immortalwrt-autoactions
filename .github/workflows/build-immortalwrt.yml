name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Config file under configs/"
        required: true
        default: "x86_64.config"
      source_branch:
        description: "ImmortalWrt branch"
        required: true
        default: "openwrt-25.12"
  schedule:
    - cron: "0 18 * * 5"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_DIR: configs
  DIY_PART1_SH: scripts/diy-part1.sh
  DIY_PART2_SH: scripts/diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Free disk space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 8192
          swap-size-mb: 4096
          remove-dotnet: true
          remove-android: true
          remove-haskell: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build variables
        run: |
          branch="${{ github.event.inputs.source_branch || env.REPO_BRANCH }}"
          config="${{ github.event.inputs.config || 'x86_64.config' }}"
          echo "SOURCE_BRANCH=${branch}" >> "$GITHUB_ENV"
          echo "CONFIG_FILE=${{ env.CONFIG_DIR }}/${config}" >> "$GITHUB_ENV"
          echo "CONFIG_PATH=${GITHUB_WORKSPACE}/${{ env.CONFIG_DIR }}/${config}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> "$GITHUB_ENV"

      - name: Verify config file
        run: |
          mkdir -p "$CONFIG_DIR"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::warning::Config file $CONFIG_FILE was not found after checkout; creating x86_64 fallback config."
            cat > "$CONFIG_FILE" <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=4096
          CONFIG_GRUB_IMAGES=y
          CONFIG_EFI_IMAGES=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-material3=y
          CONFIG_PACKAGE_luci-theme-design=y
          CONFIG_PACKAGE_luci-theme-aurora=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-easytier=y
          CONFIG_PACKAGE_easytier=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-app-store=y
          CONFIG_PACKAGE_luci-app-tailscale-community=y
          CONFIG_PACKAGE_tailscale=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y
          CONFIG_PACKAGE_smartdns=y
          CONFIG_PACKAGE_luci-app-gecoosac=y
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-filemanager=y
          CONFIG_PACKAGE_luci-i18n-filemanager-zh-cn=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_mosdns=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Geodata=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y
          CONFIG_PACKAGE_miniupnpd-nftables=y
          CONFIG_PACKAGE_luci-app-watchcat=y
          CONFIG_PACKAGE_luci-i18n-watchcat-zh-cn=y
          CONFIG_PACKAGE_luci-app-vnstat2=y
          CONFIG_PACKAGE_luci-i18n-vnstat2-zh-cn=y
          CONFIG_PACKAGE_luci-compat=y
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_qemu-ga=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_vnstat2=y
          CONFIG_PACKAGE_vnstati2=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_xz-utils=y
          EOF
          fi
          sed -i 's/^          //' "$CONFIG_FILE"
          echo "Using config: $CONFIG_PATH"
          ls -la "$CONFIG_DIR"
          test -s "$CONFIG_FILE"

      - name: Install dependencies
        timeout-minutes: 20
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo systemctl stop apt-daily.service apt-daily-upgrade.service apt-daily.timer apt-daily-upgrade.timer || true
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "$AGENT_TOOLSDIRECTORY"
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo rm -rf /var/lib/apt/lists/*
          echo 'Acquire::Languages "none";' | sudo tee /etc/apt/apt.conf.d/99no-translations
          sudo apt-get clean
          sudo apt-get -o DPkg::Lock::Timeout=120 update
          sudo apt-get -o DPkg::Lock::Timeout=120 install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            file flex gawk gettext gcc-multilib g++-multilib git gperf \
            haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev \
            libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
            libreadline-dev libssl-dev libtool lrzsz mkisofs \
            msmtp ninja-build p7zip-full patch pkgconf python3 python3-pip \
            python3-ply python3-docutils qemu-utils re2c rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev
          sudo apt-get clean

      - name: Clone ImmortalWrt
        run: |
          df -h
          git clone --depth 1 --branch "$SOURCE_BRANCH" "$REPO_URL" openwrt

      - name: Load custom feeds
        working-directory: openwrt
        run: |
          if [ -f "../$DIY_PART1_SH" ]; then
            chmod +x "../$DIY_PART1_SH"
            "../$DIY_PART1_SH"
          fi

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom settings
        working-directory: openwrt
        run: |
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::error::Config file not found: $CONFIG_PATH"
            echo "Workspace contents:"
            find "$GITHUB_WORKSPACE" -maxdepth 3 -type f | sort
            exit 1
          fi
          cp "$CONFIG_PATH" .config
          if [ -f "../$DIY_PART2_SH" ]; then
            chmod +x "../$DIY_PART2_SH"
            "../$DIY_PART2_SH"
          fi
          make defconfig

      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j"$(nproc)"
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        id: compile
        timeout-minutes: 360
        working-directory: openwrt
        run: |
          df -h
          du -sh dl staging_dir build_dir tmp 2>/dev/null || true
          make -j2 || {
            status="$?"
            echo "::warning::Parallel build failed with status ${status}; collecting disk usage before serial retry."
            df -h
            du -h --max-depth=2 build_dir staging_dir tmp 2>/dev/null | sort -h | tail -n 80 || true
            make -j1 V=s
          }

      - name: Prepare artifact
        if: always()
        run: |
          mkdir -p artifact/firmware artifact/logs
          if [ -d openwrt/bin/targets ]; then
            find openwrt/bin/targets -type f \
              \( -name "*.bin" -o -name "*.img" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.ubi" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "sha256sums" \) \
              -exec cp -v {} artifact/firmware/ \;
          fi
          cp -v openwrt/.config artifact/logs/config.build || true

      - name: Upload firmware
        if: steps.compile.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ github.event.inputs.source_branch || env.REPO_BRANCH }}-${{ github.run_number }}
          path: artifact/firmware
          retention-days: 14

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: artifact/logs
          retention-days: 7
